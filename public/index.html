<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PhotoPrism Slideshow</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="slideshow-container" class="slideshow-container">
        <div id="current-image" class="image-container">
            <img id="current-img" src="" alt="Slideshow image" />
            <div id="loading" class="loading">Loading...</div>
        </div>
        
        <div id="next-image" class="image-container hidden">
            <img id="next-img" src="" alt="Next slideshow image" />
        </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-content">
            <h2>Settings</h2>
            
            <div class="setting-group">
                <label for="duration">Slide Duration (seconds):</label>
                <input type="number" id="duration" min="1" max="60" value="5" />
            </div>
            
            <div class="setting-group">
                <label for="poll-interval">Update Check Interval (seconds):</label>
                <input type="number" id="poll-interval" min="10" max="300" value="30" />
            </div>
            
            <div class="setting-group">
                <label for="shuffle">Shuffle Photos:</label>
                <input type="checkbox" id="shuffle" />
            </div>
            
            <div class="setting-group">
                <button id="refresh-photos" class="btn">Refresh Photos Now</button>
            </div>
            
            <div class="setting-group">
                <button id="close-settings" class="btn btn-primary">Close</button>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div id="controls" class="controls">
        <button id="settings-btn" class="control-btn" title="Settings">⚙️</button>
        <button id="fullscreen-btn" class="control-btn" title="Fullscreen">⛶</button>
    </div>

    <!-- Status Bar -->
    <div id="status-bar" class="status-bar">
        <span id="photo-count">0 photos</span>
        <span id="current-index">-</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
